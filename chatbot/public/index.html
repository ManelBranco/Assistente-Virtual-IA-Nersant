        <input id="search" placeholder="🔍 Pesquisar conversas..." autocomplete="off" />

        <div id="conversations"></div>

        <button onclick="showStatsModal()" class="btn-stats">📊 Estatísticas</button>
        <button onclick="newChat()" class="btn-secondary">Nova conversa</button>
        <button onclick="clearAllHistory()" class="btn-clear-history">Remover histórico</button>
    </aside>

    <section class="main">

        <div class="topbar">
            <div>
                <h2>Assistente Virtual Nersant</h2>
                <p class="topbar-subtitle"> Inovação e tecnologia ao seu serviço</p>
            </div>
            <div class="topbar-controls">
                <label for="model"> Modelo</label>
                <select id="model">
                    <option value="granite4.1:3b">Granite 4.1</option>
                    <option value="gemma4:e4b">Gemma 4</option>
                    <option value="llama3.1:latest">Llama 3.1</option>
                </select>
            </div>
        </div>

        <div id="chat" class="chat-window">
            <div class="empty-chat">
                <p> Olá! Sou o assistente da Nersant.</p>
                <p>Como posso ajudar hoje?</p>
            </div>
        </div>

        <div class="input-area">
            <input id="input" placeholder="Escreve a tua mensagem aqui..." autocomplete="off" />
            <button onclick="send()"> Enviar</button>
        </div>

    </section>

</div>

<!-- Modal de Estatísticas -->
<div id="statsModal" class="stats-modal">
    <div class="stats-content">
        <div class="stats-header">
            <h3>📊 Estatísticas da IA</h3>
            <button onclick="closeStatsModal()" class="close-stats">&times;</button>
        </div>
        <div class="stats-body">
            <div class="stat-item">
                <span class="stat-label">⏱️ Tempo a pensar</span>
                <span class="stat-value" id="modalThinking">0.00s</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">💬 Mensagens enviadas</span>
                <span class="stat-value" id="modalMessages">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">📝 Conversas criadas</span>
                <span class="stat-value" id="modalConversations">0</span>
            </div>
        </div>
        <div class="stats-footer">
            <button onclick="closeStatsModal()">Fechar</button>
        </div>
    </div>
</div>
